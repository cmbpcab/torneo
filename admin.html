<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Campeonato</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --green-dark: #009624;
    --yellow: #ffd600; --red: #ff1744;
    --bg: #0a0f0d; --surface: #111a14; --surface2: #182019;
    --border: rgba(0,200,83,0.15); --border2: rgba(0,200,83,0.3);
    --text: #e8f5e9; --muted: #5a7a5e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 48px,rgba(0,200,83,0.03) 48px,rgba(0,200,83,0.03) 50px),
      repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(0,200,83,0.03) 48px,rgba(0,200,83,0.03) 50px);
  }
  header {
    position:relative; z-index:1; padding:1.25rem 1.5rem;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:2px; color:var(--green); }
  .logo span { color:var(--text); }
  .admin-badge {
    background:rgba(255,214,0,0.12); color:var(--yellow);
    font-family:'Barlow Condensed',sans-serif; font-size:0.7rem;
    letter-spacing:2px; text-transform:uppercase;
    padding:3px 10px; border-radius:20px; border:1px solid rgba(255,214,0,0.3);
  }
  main { position:relative; z-index:1; max-width:760px; margin:0 auto; padding:1.5rem; }

  /* ── SECTION ── */
  .section { margin-bottom:2rem; }
  .section-title {
    font-family:'Bebas Neue',sans-serif; font-size:0.9rem; letter-spacing:3px;
    color:var(--muted); text-transform:uppercase; margin-bottom:1rem;
    display:flex; align-items:center; gap:10px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* ── FORM ADD MATCH ── */
  .add-form {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:1.25rem;
  }
  .form-grid {
    display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:end; margin-bottom:12px;
  }
  .field { display:flex; flex-direction:column; gap:5px; }
  label { font-family:'Barlow Condensed',sans-serif; font-size:0.7rem; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
  input[type=text], select {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); font-family:'Barlow',sans-serif; font-size:0.9rem;
    padding:8px 10px; border-radius:8px; outline:none; width:100%;
    transition:border-color 0.2s;
  }
  input[type=text]:focus, select:focus { border-color:var(--green); }
  select option { background:#111; }
  .vs-label {
    font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--muted);
    padding-bottom:6px; text-align:center;
  }
  .form-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px; }

  .btn {
    font-family:'Barlow Condensed',sans-serif; font-size:0.85rem;
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    padding:9px 20px; border-radius:8px; border:none; cursor:pointer;
    transition:opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--green); color:#000; }
  .btn-primary:hover { opacity:0.88; }
  .btn-danger { background:rgba(255,23,68,0.15); color:var(--red); border:1px solid rgba(255,23,68,0.3); }
  .btn-danger:hover { background:rgba(255,23,68,0.25); }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:var(--border2); color:var(--text); }
  .btn-sm { padding:5px 12px; font-size:0.75rem; }
  .btn-live { background:rgba(0,200,83,0.15); color:var(--green); border:1px solid var(--border2); }
  .btn-live:hover { background:rgba(0,200,83,0.25); }
  .btn-end  { background:rgba(255,214,0,0.1); color:var(--yellow); border:1px solid rgba(255,214,0,0.25); }
  .btn-end:hover  { background:rgba(255,214,0,0.2); }

  /* ── MATCH LIST ── */
  .match-row {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:1rem 1.25rem;
    display:flex; flex-direction:column; gap:10px;
    animation:fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .match-row.live-row { border-color:rgba(0,200,83,0.4); }

  .row-top {
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px;
  }
  .team-label {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:1rem;
  }
  .team-label.right { text-align:right; }
  .score-inputs { display:flex; align-items:center; gap:6px; }
  input.score-inp {
    width:52px; text-align:center; font-family:'Bebas Neue',sans-serif;
    font-size:1.8rem; padding:4px 6px; border-radius:8px;
  }
  .sep { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--muted); }

  .row-bottom { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .status-pill {
    font-family:'Barlow Condensed',sans-serif; font-size:0.68rem;
    letter-spacing:1.5px; text-transform:uppercase;
    padding:2px 10px; border-radius:20px;
  }
  .pill-pending { background:rgba(255,214,0,0.1); color:var(--yellow); }
  .pill-live    { background:rgba(0,200,83,0.15); color:var(--green); }
  .pill-finished{ background:rgba(255,255,255,0.05); color:var(--muted); }

  .phase-tag {
    font-family:'Barlow Condensed',sans-serif; font-size:0.68rem;
    letter-spacing:1px; color:var(--muted); text-transform:uppercase;
  }

  /* penalty row */
  .pen-row {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding-top:8px; border-top:1px solid var(--border);
  }
  .pen-row label { font-size:0.7rem; }
  .pen-row input[type=checkbox] { accent-color:var(--green); width:14px; height:14px; cursor:pointer; }
  input.pen-inp { width:44px; text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; }

  .matches-list { display:flex; flex-direction:column; gap:0.75rem; }

  .empty { text-align:center; padding:2rem; color:var(--muted);
    font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; font-size:0.9rem; }

  /* toast */
  #toast {
    position:fixed; bottom:20px; right:20px; z-index:999;
    background:var(--green); color:#000;
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    letter-spacing:1px; font-size:0.85rem;
    padding:10px 20px; border-radius:8px;
    opacity:0; transition:opacity 0.3s; pointer-events:none;
  }
  #toast.show { opacity:1; }

  @media(max-width:500px) {
    .form-grid { grid-template-columns:1fr; }
    .vs-label { display:none; }
    .form-row { grid-template-columns:1fr 1fr; }
    .row-top { grid-template-columns:1fr auto 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚽ <span>Campeonato</span></div>
  <div class="admin-badge">Admin</div>
</header>

<main>

  <!-- ADD MATCH -->
  <div class="section">
    <div class="section-title">Nova partida</div>
    <div class="add-form">
      <div class="form-grid">
        <div class="field">
          <label>Time 1</label>
          <input type="text" id="new-t1" placeholder="Nome do time">
        </div>
        <div class="vs-label">VS</div>
        <div class="field">
          <label>Time 2</label>
          <input type="text" id="new-t2" placeholder="Nome do time">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Fase</label>
          <select id="new-phase">
            <option value="oitavas">Oitavas</option>
            <option value="quartas">Quartas</option>
            <option value="semi">Semifinal</option>
            <option value="terceiro">3º lugar</option>
            <option value="final" selected>Final</option>
          </select>
        </div>
        <div class="field">
          <label>Horário</label>
          <input type="text" id="new-time" placeholder="Ex: 15:00">
        </div>
        <div class="field" style="justify-content:flex-end">
          <button class="btn btn-primary" onclick="addMatch()">+ Adicionar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MATCHES -->
  <div class="section">
    <div class="section-title">Partidas</div>
    <div class="matches-list" id="matches-list">
      <div class="empty">Carregando...</div>
    </div>
  </div>

</main>

<div id="toast">✓ Salvo</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, push, update, remove, set }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ── CONFIGURAÇÃO FIREBASE ──────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyBftlXjMHDtZ8-PSQkdUCADDAu6Xn39yFE",
    authDomain: "torneo-cmbp.firebaseapp.com",
    databaseURL: "https://torneo-cmbp-default-rtdb.firebaseio.com",
    projectId: "torneo-cmbp",
    storageBucket: "torneo-cmbp.firebasestorage.app",
    messagingSenderId: "125647418490",
    appId: "1:125647418490:web:136598ddfb2b04cb0c37c3",
    measurementId: "G-76ME6DGHEP"
  };
  // ──────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const matchesRef = ref(db, 'matches');

  const PHASE_LABELS = {
    oitavas:'Oitavas', quartas:'Quartas', semi:'Semifinal',
    terceiro:'3º lugar', final:'Final'
  };

  let allMatches = {};

  function toast(msg='✓ Salvo') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── ADD MATCH ──
  window.addMatch = async function() {
    const t1 = document.getElementById('new-t1').value.trim();
    const t2 = document.getElementById('new-t2').value.trim();
    const phase = document.getElementById('new-phase').value;
    const time  = document.getElementById('new-time').value.trim();
    if (!t1 || !t2) { alert('Preencha os dois times.'); return; }
    const order = Date.now();
    await push(matchesRef, { team1:t1, team2:t2, phase, time, status:'pending', score1:0, score2:0, penalty:false, pen1:0, pen2:0, order });
    document.getElementById('new-t1').value = '';
    document.getElementById('new-t2').value = '';
    document.getElementById('new-time').value = '';
    toast('✓ Partida adicionada');
  };

  // ── SAVE SCORE ──
  window.saveScore = async function(id) {
    const s1 = parseInt(document.getElementById(`s1-${id}`).value) || 0;
    const s2 = parseInt(document.getElementById(`s2-${id}`).value) || 0;
    const p1 = parseInt(document.getElementById(`p1-${id}`)?.value) || 0;
    const p2 = parseInt(document.getElementById(`p2-${id}`)?.value) || 0;
    const pen = document.getElementById(`pen-${id}`)?.checked || false;
    await update(ref(db, `matches/${id}`), { score1:s1, score2:s2, penalty:pen, pen1:p1, pen2:p2 });
    toast();
  };

  // ── STATUS ──
  window.setStatus = async function(id, status) {
    await update(ref(db, `matches/${id}`), { status });
    toast(status === 'live' ? '● Ao vivo' : status === 'finished' ? '✓ Encerrado' : '⏸ Pendente');
  };

  // ── DELETE ──
  window.deleteMatch = async function(id) {
    if (!confirm('Remover esta partida?')) return;
    await remove(ref(db, `matches/${id}`));
    toast('✗ Removida');
  };

  // ── RENDER ──
  function render(matches) {
    const el = document.getElementById('matches-list');
    if (!matches || !Object.keys(matches).length) {
      el.innerHTML = '<div class="empty">Nenhuma partida ainda. Adicione acima ↑</div>'; return;
    }
    const sorted = Object.entries(matches).sort(([,a],[,b]) => (a.order||0)-(b.order||0));
    el.innerHTML = sorted.map(([id, m]) => `
      <div class="match-row ${m.status==='live'?'live-row':''}">
        <div class="row-top">
          <div class="team-label">${m.team1}</div>
          <div class="score-inputs">
            <input class="score-inp" id="s1-${id}" type="number" min="0" value="${m.score1??0}">
            <span class="sep">×</span>
            <input class="score-inp" id="s2-${id}" type="number" min="0" value="${m.score2??0}">
          </div>
          <div class="team-label right">${m.team2}</div>
        </div>

        <div class="pen-row">
          <input type="checkbox" id="pen-${id}" ${m.penalty?'checked':''}>
          <label for="pen-${id}">Pênaltis</label>
          <input class="score-inp pen-inp" id="p1-${id}" type="number" min="0" value="${m.pen1??0}" placeholder="0">
          <span class="sep" style="font-size:1rem">×</span>
          <input class="score-inp pen-inp" id="p2-${id}" type="number" min="0" value="${m.pen2??0}" placeholder="0">
        </div>

        <div class="row-bottom">
          <span class="status-pill pill-${m.status||'pending'}">${
            m.status==='live'?'● Ao vivo':m.status==='finished'?'Encerrado':'Aguardando'
          }</span>
          <span class="phase-tag">${PHASE_LABELS[m.phase]||m.phase} ${m.time?'· '+m.time:''}</span>
          <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-sm btn-primary" onclick="saveScore('${id}')">Salvar</button>
            <button class="btn btn-sm btn-live" onclick="setStatus('${id}','live')">Ao vivo</button>
            <button class="btn btn-sm btn-end" onclick="setStatus('${id}','finished')">Encerrar</button>
            <button class="btn btn-sm btn-ghost" onclick="setStatus('${id}','pending')">Resetar</button>
            <button class="btn btn-sm btn-danger" onclick="deleteMatch('${id}')">✕</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  onValue(matchesRef, snap => {
    allMatches = snap.val() || {};
    render(allMatches);
  });

  // Enter key on team inputs
  ['new-t1','new-t2','new-time'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') window.addMatch();
    });
  });
</script>
</body>
</html>
