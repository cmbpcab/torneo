<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo CMBP · Marcador</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green:      #00c853;
    --green-dim:  #009624;
    --yellow:     #ffd600;
    --yellow-dim: #c7a500;
    --red:        #ff1744;
    --bg:         #080c09;
    --surface:    #0f1710;
    --surface2:   #162018;
    --border:     rgba(0,200,83,0.13);
    --border-y:   rgba(255,214,0,0.18);
    --text:       #edf5ee;
    --muted:      #4e6e52;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,200,83,0.07) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(0,200,83,0.025) 59px, rgba(0,200,83,0.025) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(0,200,83,0.025) 59px, rgba(0,200,83,0.025) 60px);
  }

  /* ── HEADER ── */
  header {
    position:relative; z-index:2;
    padding: 0 1.5rem;
    height: 72px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,9,0.85);
    backdrop-filter: blur(12px);
  }

  .header-left { display:flex; align-items:center; gap:14px; }

  .emblem {
    width:44px; height:44px;
    border-radius:50%;
    border: 2px solid var(--yellow);
    background: radial-gradient(circle, rgba(255,214,0,0.12), transparent 70%);
    display:flex; align-items:center; justify-content:center;
    font-size:1.4rem; flex-shrink:0;
  }

  .logo-text {
    display:flex; flex-direction:column; line-height:1;
  }
  .logo-main {
    font-family:'Bebas Neue', sans-serif;
    font-size:1.6rem; letter-spacing:3px;
    color: var(--yellow);
  }
  .logo-sub {
    font-family:'Barlow Condensed', sans-serif;
    font-size:0.6rem; letter-spacing:3px; text-transform:uppercase;
    color: var(--muted);
  }

  .live-badge {
    display:flex; align-items:center; gap:7px;
    font-family:'Barlow Condensed', sans-serif;
    font-size:0.7rem; letter-spacing:2px; text-transform:uppercase;
    color: var(--green);
    border:1px solid rgba(0,200,83,0.25);
    padding:4px 12px; border-radius:20px;
    background:rgba(0,200,83,0.07);
  }
  .live-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--green);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.3; transform:scale(0.7); }
  }

  /* ── HERO BANNER ── */
  .hero {
    position:relative; z-index:1;
    text-align:center; padding:2.5rem 1.5rem 1.5rem;
    border-bottom:1px solid var(--border-y);
  }
  .hero-flag {
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-bottom:0.5rem;
  }
  .flag-stripe {
    height:3px; width:40px; border-radius:2px;
  }
  .flag-stripe.g { background:var(--green); }
  .flag-stripe.y { background:var(--yellow); }

  .hero-title {
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(2.2rem,8vw,4rem);
    letter-spacing:6px;
    background: linear-gradient(135deg, var(--yellow) 0%, #fff8aa 40%, var(--green) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1;
  }
  .hero-sub {
    font-family:'Barlow Condensed', sans-serif;
    font-size:0.75rem; letter-spacing:4px; text-transform:uppercase;
    color:var(--muted); margin-top:6px;
  }

  /* ── TABS (categories) ── */
  .tabs-wrap {
    position:relative; z-index:1;
    display:flex; justify-content:center; gap:6px;
    padding:1.25rem 1.5rem 0;
  }
  .tab {
    font-family:'Barlow Condensed', sans-serif;
    font-size:0.8rem; letter-spacing:2px; text-transform:uppercase;
    font-weight:700;
    padding:7px 20px; border-radius:6px;
    border: 1px solid var(--border);
    background:transparent; color:var(--muted);
    cursor:pointer; transition:all 0.2s;
  }
  .tab:hover { color:var(--text); border-color:rgba(0,200,83,0.3); }
  .tab.active {
    background:var(--yellow); color:#000;
    border-color:var(--yellow);
  }

  /* ── MAIN ── */
  main {
    position:relative; z-index:1;
    max-width:680px; margin:0 auto;
    padding:1.5rem;
  }

  .category-panel { display:none; }
  .category-panel.active { display:block; }

  .phase-title {
    font-family:'Bebas Neue', sans-serif;
    font-size:0.85rem; letter-spacing:4px;
    color:var(--muted); text-transform:uppercase;
    margin:1.5rem 0 0.75rem;
    display:flex; align-items:center; gap:12px;
  }
  .phase-title::before {
    content:''; width:3px; height:14px;
    border-radius:2px; background:var(--yellow);
    flex-shrink:0;
  }
  .phase-title::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* ── MATCH CARD ── */
  .matches { display:flex; flex-direction:column; gap:0.6rem; }

  .match-card {
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:0.9rem 1.1rem;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:0.75rem;
    animation:fadeUp 0.35s ease both;
    transition:border-color 0.3s;
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:none}
  }
  .match-card.live   { border-color:rgba(0,200,83,0.45); background:rgba(0,200,83,0.03); }
  .match-card.finished{ opacity:0.72; }
  .match-card.pending { opacity:0.5; }

  .team { display:flex; flex-direction:column; gap:2px; }
  .team.right { text-align:right; align-items:flex-end; }
  .team-name {
    font-family:'Barlow Condensed', sans-serif;
    font-size:1rem; font-weight:700; letter-spacing:0.5px;
    color:var(--text); text-transform:uppercase;
  }
  .team.winner .team-name { color:var(--yellow); }
  .team-badge { font-size:0.62rem; color:var(--muted); letter-spacing:1px; }

  .score-block {
    display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .score-row { display:flex; align-items:center; gap:5px; }
  .score {
    font-family:'Bebas Neue', sans-serif;
    font-size:2.6rem; line-height:1;
    color:var(--text); min-width:1.4ch; text-align:center;
  }
  .score-sep { font-family:'Bebas Neue', sans-serif; font-size:1.6rem; color:var(--muted); }

  .match-time {
    font-size:0.6rem; font-family:'Barlow Condensed', sans-serif;
    letter-spacing:1.5px; color:var(--muted); text-transform:uppercase;
    margin-bottom:1px;
  }

  .match-status {
    font-size:0.6rem; font-family:'Barlow Condensed', sans-serif;
    letter-spacing:1.5px; text-transform:uppercase;
    padding:2px 8px; border-radius:20px;
  }
  .s-live     { background:rgba(0,200,83,0.15);  color:var(--green); }
  .s-finished { background:rgba(255,255,255,0.05); color:var(--muted); }
  .s-pending  { background:rgba(255,214,0,0.1);  color:var(--yellow); }

  .penalty-note {
    grid-column:1/-1; text-align:center;
    font-size:0.65rem; color:var(--muted); letter-spacing:1px;
    font-family:'Barlow Condensed', sans-serif; text-transform:uppercase;
    margin-top:-4px;
  }

  .empty-state {
    text-align:center; padding:3rem 1rem;
    color:var(--muted); font-family:'Barlow Condensed', sans-serif;
    letter-spacing:1px; font-size:0.9rem;
  }
  .empty-icon { font-size:2.5rem; margin-bottom:0.5rem; }

  /* ── FOOTER ── */
  footer {
    position:relative; z-index:1;
    text-align:center; padding:1.25rem;
    font-size:0.68rem; color:var(--muted);
    font-family:'Barlow Condensed', sans-serif; letter-spacing:1.5px;
    border-top:1px solid var(--border);
  }

  /* ── LOADER ── */
  .loader {
    display:flex; justify-content:center; align-items:center;
    height:35vh; flex-direction:column; gap:1rem;
    color:var(--muted); font-family:'Barlow Condensed', sans-serif; letter-spacing:2px;
    font-size:0.8rem;
  }
  .loader-ring {
    width:32px; height:32px; border-radius:50%;
    border:2px solid var(--border);
    border-top-color:var(--yellow);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{transform:rotate(360deg)} }

  @media(max-width:480px){
    .hero-title{ font-size:2.2rem; letter-spacing:4px; }
    .tabs-wrap{ gap:4px; }
    .tab{ padding:6px 14px; font-size:0.72rem; }
    .score{ font-size:2.2rem; }
    .team-name{ font-size:0.9rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="emblem">⚽</div>
    <div class="logo-text">
      <div class="logo-main">Torneo CMBP</div>
      <div class="logo-sub">Cooperación Militar Brasileña en el Paraguay</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>En vivo</div>
</header>

<div class="hero">
  <div class="hero-flag">
    <div class="flag-stripe g"></div>
    <div class="flag-stripe y"></div>
    <div class="flag-stripe g"></div>
  </div>
  <div class="hero-title">Torneo CMBP</div>
  <div class="hero-sub">Integración · Cooperación · Amistad</div>
</div>

<div class="tabs-wrap">
  <button class="tab active" onclick="showCategory('oficiales',this)">Oficiales</button>
  <button class="tab" onclick="showCategory('femenino',this)">Femenino</button>
  <button class="tab" onclick="showCategory('suboficiales',this)">Suboficiales</button>
</div>

<main>
  <div id="cat-oficiales"    class="category-panel active"><div class="loader"><div class="loader-ring"></div>Cargando...</div></div>
  <div id="cat-femenino"     class="category-panel"><div class="empty-state"><div class="empty-icon">⚽</div>Cargando...</div></div>
  <div id="cat-suboficiales" class="category-panel"><div class="empty-state"><div class="empty-icon">⚽</div>Cargando...</div></div>
</main>

<footer id="last-update">Actualizando...</footer>

<script type="module">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBftlXjMHDtZ8-PSQkdUCADDAu6Xn39yFE",
    authDomain: "torneo-cmbp.firebaseapp.com",
    databaseURL: "https://torneo-cmbp-default-rtdb.firebaseio.com",
    projectId: "torneo-cmbp",
    storageBucket: "torneo-cmbp.firebasestorage.app",
    messagingSenderId: "125647418490",
    appId: "1:125647418490:web:136598ddfb2b04cb0c37c3"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const PHASE_LABELS = {
    cuartos:'Cuartos de final', semi:'Semifinales',
    tercero:'Disputa por el 3.º lugar', final:'Final'
  };
  const PHASE_ORDER = ['cuartos','semi','tercero','final'];
  const CATEGORIES  = ['oficiales','femenino','suboficiales'];

  window.showCategory = function(cat, btn) {
    document.querySelectorAll('.category-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('cat-'+cat).classList.add('active');
    btn.classList.add('active');
  };

  function statusEl(s) {
    if (s === 'live')     return `<span class="match-status s-live">● En vivo</span>`;
    if (s === 'finished') return `<span class="match-status s-finished">Finalizado</span>`;
    return `<span class="match-status s-pending">Por jugar</span>`;
  }

  function renderCategory(catId, matches) {
    const el = document.getElementById('cat-'+catId);
    if (!matches || !Object.keys(matches).length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚽</div>Sin partidos registrados aún.</div>`;
      return;
    }
    const byPhase = {};
    Object.entries(matches).forEach(([id,m]) => {
      if (!byPhase[m.phase]) byPhase[m.phase] = [];
      byPhase[m.phase].push({id,...m});
    });
    let html = '';
    PHASE_ORDER.forEach(phase => {
      if (!byPhase[phase]) return;
      const list = byPhase[phase].sort((a,b)=>(a.order||0)-(b.order||0));
      html += `<div class="phase-title">${PHASE_LABELS[phase]||phase}</div><div class="matches">`;
      list.forEach(m => {
        const s1  = m.status==='pending'?'–':(m.score1??0);
        const s2  = m.status==='pending'?'–':(m.score2??0);
        const w1  = m.status==='finished' && Number(m.score1)>Number(m.score2);
        const w2  = m.status==='finished' && Number(m.score2)>Number(m.score1);
        const pen = m.penalty?`<div class="penalty-note">Penales: ${m.pen1} × ${m.pen2}</div>`:'';
        html += `
          <div class="match-card ${m.status||'pending'}">
            <div class="team ${w1?'winner':''}">
              <div class="team-name">${m.team1||'Equipo A'}</div>
            </div>
            <div class="score-block">
              <div class="match-time">${m.code ? `<span style="color:var(--yellow);font-weight:700;letter-spacing:1px">${m.code}</span>${m.time?' · '+m.time:''}` : (m.time||'')}</div>
              <div class="score-row">
                <div class="score">${s1}</div>
                <div class="score-sep">×</div>
                <div class="score">${s2}</div>
              </div>
              ${statusEl(m.status)}
            </div>
            <div class="team right ${w2?'winner':''}">
              <div class="team-name">${m.team2||'Equipo B'}</div>
            </div>
            ${pen}
          </div>`;
      });
      html += `</div>`;
    });
    el.innerHTML = html;
  }

  CATEGORIES.forEach(cat => {
    onValue(ref(db, `matches/${cat}`), snap => {
      renderCategory(cat, snap.val());
      const now = new Date().toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('last-update').textContent = `Última actualización: ${now}`;
    });
  });
</script>
</body>
</html>
