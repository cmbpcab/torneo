<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato · Placar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --green-dark: #009624;
    --yellow: #ffd600;
    --red: #ff1744;
    --bg: #0a0f0d;
    --surface: #111a14;
    --surface2: #182019;
    --border: rgba(0,200,83,0.15);
    --text: #e8f5e9;
    --muted: #5a7a5e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* field texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(0,200,83,0.03) 48px, rgba(0,200,83,0.03) 50px),
      repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(0,200,83,0.03) 48px, rgba(0,200,83,0.03) 50px);
    pointer-events: none; z-index: 0;
  }

  header {
    position: relative; z-index: 1;
    padding: 1.5rem 1.5rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 2px;
    color: var(--green);
  }
  .logo span { color: var(--text); }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted);
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  main { position: relative; z-index: 1; padding: 1.5rem; max-width: 700px; margin: 0 auto; }

  .phase-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 10px;
  }
  .phase-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .matches { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }

  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.3s;
    animation: fadeIn 0.4s ease both;
  }
  .match-card.live { border-color: rgba(0,200,83,0.5); }
  .match-card.finished { opacity: 0.7; }
  .match-card.pending { opacity: 0.55; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .team { display: flex; flex-direction: column; gap: 2px; }
  .team.right { text-align: right; align-items: flex-end; }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px;
    color: var(--text);
  }
  .team-badge {
    font-size: 0.7rem; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px;
  }
  .team.winner .team-name { color: var(--green); }

  .score-block {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .score-display {
    display: flex; align-items: center; gap: 6px;
  }
  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem; line-height: 1;
    color: var(--text); min-width: 1.5ch; text-align: center;
  }
  .score-sep { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--muted); }
  .match-status {
    font-size: 0.65rem; font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 8px; border-radius: 20px;
  }
  .status-live { background: rgba(0,200,83,0.15); color: var(--green); }
  .status-finished { background: rgba(255,255,255,0.05); color: var(--muted); }
  .status-pending { background: rgba(255,214,0,0.1); color: var(--yellow); }
  .match-round {
    font-size: 0.65rem; font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px; color: var(--muted); text-transform: uppercase;
    margin-bottom: 2px;
  }

  /* penalty shootout */
  .penalty-note {
    grid-column: 1/-1; text-align: center;
    font-size: 0.7rem; color: var(--muted); letter-spacing: 1px;
    font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase;
    margin-top: -4px;
  }

  .empty-state {
    text-align: center; padding: 3rem 1rem; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 0.5rem; }

  footer {
    position: relative; z-index: 1;
    text-align: center; padding: 1.5rem;
    font-size: 0.72rem; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px;
    border-top: 1px solid var(--border);
  }

  /* loading */
  .loader {
    display: flex; justify-content: center; align-items: center;
    height: 40vh; flex-direction: column; gap: 1rem;
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 2px;
  }
  .loader-ring {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">⚽ <span>Campeonato</span></div>
  <div class="live-badge"><div class="live-dot"></div> Ao vivo</div>
</header>

<main id="app">
  <div class="loader">
    <div class="loader-ring"></div>
    Carregando partidas...
  </div>
</main>

<footer id="last-update">Atualizando...</footer>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ── CONFIGURAÇÃO FIREBASE ──────────────────────────────────────────────────
  // Substitua pelos seus dados do Firebase Console
  const firebaseConfig = {
    apiKey: "AIzaSyBftlXjMHDtZ8-PSQkdUCADDAu6Xn39yFE",
    authDomain: "torneo-cmbp.firebaseapp.com",
    databaseURL: "https://torneo-cmbp-default-rtdb.firebaseio.com",
    projectId: "torneo-cmbp",
    storageBucket: "torneo-cmbp.firebasestorage.app",
    messagingSenderId: "125647418490",
    appId: "1:125647418490:web:136598ddfb2b04cb0c37c3",
    measurementId: "G-76ME6DGHEP"
  };
  // ──────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const PHASE_LABELS = {
    oitavas: 'Oitavas de final',
    quartas: 'Quartas de final',
    semi: 'Semifinais',
    final: 'Final',
    terceiro: 'Disputa de 3º lugar'
  };
  const PHASE_ORDER = ['oitavas','quartas','semi','terceiro','final'];

  function statusLabel(s) {
    if (s === 'live') return `<span class="match-status status-live">● Ao vivo</span>`;
    if (s === 'finished') return `<span class="match-status status-finished">Encerrado</span>`;
    return `<span class="match-status status-pending">Aguardando</span>`;
  }

  function renderMatches(matches) {
    const app = document.getElementById('app');
    if (!matches || Object.keys(matches).length === 0) {
      app.innerHTML = `<div class="empty-state"><div class="icon">🏆</div>Nenhuma partida cadastrada ainda.</div>`;
      return;
    }

    // Group by phase
    const byPhase = {};
    Object.entries(matches).forEach(([id, m]) => {
      if (!byPhase[m.phase]) byPhase[m.phase] = [];
      byPhase[m.phase].push({ id, ...m });
    });

    let html = '';
    PHASE_ORDER.forEach(phase => {
      if (!byPhase[phase]) return;
      const list = byPhase[phase].sort((a,b) => (a.order||0)-(b.order||0));
      html += `<div class="phase-title">${PHASE_LABELS[phase] || phase}</div><div class="matches">`;
      list.forEach(m => {
        const s1 = m.status === 'pending' ? '–' : (m.score1 ?? '0');
        const s2 = m.status === 'pending' ? '–' : (m.score2 ?? '0');
        const w1 = m.status === 'finished' && Number(m.score1) > Number(m.score2);
        const w2 = m.status === 'finished' && Number(m.score2) > Number(m.score1);
        const pen = m.penalty ? `<div class="penalty-note">Pênaltis: ${m.pen1} × ${m.pen2}</div>` : '';
        html += `
          <div class="match-card ${m.status || 'pending'}">
            <div class="team ${w1?'winner':''}">
              <div class="team-name">${m.team1 || 'Time A'}</div>
            </div>
            <div class="score-block">
              <div class="match-round">${m.time || ''}</div>
              <div class="score-display">
                <div class="score">${s1}</div>
                <div class="score-sep">×</div>
                <div class="score">${s2}</div>
              </div>
              ${statusLabel(m.status)}
            </div>
            <div class="team right ${w2?'winner':''}">
              <div class="team-name">${m.team2 || 'Time B'}</div>
            </div>
            ${pen}
          </div>`;
      });
      html += `</div>`;
    });
    app.innerHTML = html;

    const now = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-update').textContent = `Última atualização: ${now}`;
  }

  onValue(ref(db, 'matches'), snap => renderMatches(snap.val()));
</script>
</body>
</html>
